<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manga Translator</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header class="header">
    <span class="header-logo">漫</span>
    <span class="header-title">Manga Translator</span>
    <button id="settingsBtn" class="btn-icon-round" title="Réglages">⚙️</button>
  </header>

  <!-- Panneau réglages (overlay) -->
  <div id="settingsPanel" class="settings-panel hidden">
    <div class="settings-header">
      <span class="settings-title">Réglages</span>
      <button id="settingsCloseBtn" class="btn-icon-round">✕</button>
    </div>
    <div class="settings-body">
      <label class="settings-label" for="apiKeyInput">Clé API Gemini</label>
      <div class="api-key-row">
        <input id="apiKeyInput" type="password" class="api-key-input" placeholder="AIza…" autocomplete="off" spellcheck="false" />
        <button id="toggleKeyBtn" class="btn-toggle-key" title="Afficher / masquer">👁</button>
      </div>
      <a class="settings-link" href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Obtenir une clé gratuite →</a>
      <button id="saveKeyBtn" class="capture-btn btn-save-key">Enregistrer</button>
      <p id="saveKeyMsg" class="save-key-msg hidden"></p>
    </div>
  </div>

  <main class="main">
    <div class="controls">
      <button id="fullPageBtn" class="capture-btn">
        <span class="btn-icon">📄</span>
        <span class="btn-label">Page entière</span>
      </button>
      <button id="captureBtn" class="btn-capture-visible">
        <span class="btn-icon">📸</span>
        <span class="btn-label">Écran visible</span>
      </button>
    </div>

    <section id="resultZone" class="result-zone">

      <!-- État vide -->
      <div id="stateEmpty" class="state-empty">
        <p class="state-hint" id="emptyHint">Clique sur Capturer pendant que tu lis ton scan</p>
      </div>

      <!-- État chargement / progression -->
      <div id="stateProgress" class="state-progress hidden">
        <span class="progress-spinner">⏳</span>
        <p id="progressText" class="progress-text">Préparation…</p>
      </div>

      <!-- État sélection de zone -->
      <div id="stateSelect" class="state-select hidden">
        <p class="select-hint">Dessine un rectangle sur la bulle à analyser</p>
        <div class="select-canvas-wrap">
          <canvas id="selectCanvas"></canvas>
        </div>
        <div class="select-actions">
          <button id="analyzeSelBtn" class="capture-btn btn-sm">Analyser la sélection</button>
          <button id="analyzeAllBtn" class="btn-secondary">Toute l'image</button>
          <button id="recaptureBtn" class="btn-secondary">↩ Recapturer</button>
        </div>
      </div>

      <!-- État succès -->
      <div id="stateSuccess" class="state-success hidden">
        <img id="capturePreview" class="capture-preview" alt="Capture" />

        <div class="blocks-header">
          <span id="blocksCount" class="blocks-count"></span>
          <div class="blocks-actions">
            <button id="copyAllBtn" class="btn-secondary">Copier tout</button>
            <button id="newCaptureBtn" class="btn-secondary">Nouvelle capture</button>
          </div>
        </div>

        <div id="blocksContainer" class="blocks-container"></div>
      </div>

      <!-- État erreur -->
      <div id="stateError" class="state-error hidden">
        <span class="error-icon">⚠️</span>
        <p id="errorMessage" class="error-message"></p>
        <button id="retryBtn" class="btn-secondary btn-retry">Réessayer</button>
      </div>

    </section>
  </main>

  <footer class="footer">
    <span>v0.2.0</span>
  </footer>

  <script src="selector.js"></script>
  <script src="gemini.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
